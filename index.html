<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Incisiv | Project Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8; --white: #fff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b; --accent: #4f46e5;
      --green: #16a34a; --green-bg: #dcfce7;
      --yellow: #b45309; --yellow-bg: #fef9c3;
      --red: #dc2626; --red-bg: #fee2e2;
      --grey: #6b7280; --grey-bg: #f3f4f6;
      --navy: #111827;
      --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Top bar ── */
    .topbar { background: var(--navy); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-name { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .brand-tag { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .live-badge { display: flex; align-items: center; gap: 6px; background: #1f2937; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #9ca3af; }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }
    .last-updated { font-size: 11.5px; color: #6b7280; }

    /* ── Content ── */
    .content { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* ── Project header ── */
    .project-header { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 22px 26px; margin-bottom: 20px; box-shadow: var(--shadow); display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
    .project-title { font-size: 20px; font-weight: 800; color: var(--text); }
    .project-meta-row { display: flex; align-items: center; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-accent { background: #ede9fe; color: #6d28d9; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .project-notes { font-size: 12.5px; color: var(--muted); max-width: 560px; line-height: 1.6; margin-top: 8px; }
    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat-box { text-align: center; min-width: 90px; }
    .stat-num { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; font-weight: 500; }
    .stat-num.red { color: var(--red); } .stat-num.yellow { color: var(--yellow); } .stat-num.green { color: var(--green); } .stat-num.accent { color: var(--accent); }

    /* ── Progress bar ── */
    .progress-wrap { margin-top: 14px; }
    .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #4f46e5, #818cf8); transition: width .6s ease; }
    .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: flex; justify-content: space-between; }

    /* ── Section ── */
    .section { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
    .section-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 14px; font-weight: 700; }
    .section-body { padding: 20px; }

    /* ── Gantt ── */
    .gantt-wrap { overflow-x: auto; }
    .gantt-table { width: 100%; border-collapse: collapse; min-width: 620px; }
    .gantt-table th { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; padding: 6px 10px; background: #f8fafc; border-bottom: 1px solid var(--border); }
    .gantt-table th.name-col { text-align: left; width: 220px; }
    .gantt-table th.due-col { text-align: center; width: 90px; }
    .gantt-table th.left-col { text-align: center; width: 90px; }
    .gantt-table th.bar-col { text-align: left; }
    .gantt-row td { padding: 10px; vertical-align: middle; border-bottom: 1px solid #f0f4f8; }
    .gantt-row:last-child td { border-bottom: none; }
    .gantt-row:hover td { background: #f8fafc; }
    .d-name { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .due-text { font-size: 12.5px; color: var(--muted); text-align: center; }
    .days-badge { display: inline-flex; justify-content: center; align-items: center; font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px; min-width: 72px; }
    .bar-cell { padding-right: 16px !important; }
    .bar-track { height: 10px; background: #f0f4f8; border-radius: 99px; overflow: hidden; min-width: 200px; }
    .bar-fill { height: 100%; border-radius: 99px; }
    .completed-row td { opacity: .5; }
    .completed-name { text-decoration: line-through; }

    /* ── Deliverables full table ── */
    .deliv-table { width: 100%; border-collapse: collapse; }
    .deliv-table th { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; padding: 8px 14px; background: #f8fafc; border-bottom: 1px solid var(--border); text-align: left; }
    .deliv-table td { padding: 11px 14px; border-bottom: 1px solid #f0f4f8; font-size: 13px; vertical-align: middle; }
    .deliv-table tr:last-child td { border-bottom: none; }
    .deliv-table tr:hover td { background: #f8fafc; }
    .check-icon { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .check-done { background: var(--green-bg); color: var(--green); }
    .check-pending { background: #f3f4f6; color: #d1d5db; border: 1.5px solid #e5e7eb; }

    /* ── Stakeholders ── */
    .stakeholder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .stakeholder-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
    .s-name { font-size: 13px; font-weight: 600; }
    .s-role { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
    .s-email { font-size: 11px; color: var(--accent); margin-top: 4px; }

    /* ── Footer ── */
    .footer { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; }

    /* ── Loading / Error ── */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; flex-direction: column; gap: 16px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div>
      <div class="brand-name">Incisiv</div>
      <div class="brand-tag">Project Tracker</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="live-badge"><div class="live-dot"></div> Live</div>
    <div class="last-updated" id="last-updated">Loading…</div>
  </div>
</div>

<div class="content" id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading project data…</div>
  </div>
</div>

<div class="footer">Incisiv Project Tracker · Data refreshes every 5 minutes</div>

<script>
const DATA_URL = './data.json';
const REFRESH_MS = 5 * 60 * 1000; // 5 min

function fmt(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + (dateStr.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtShort(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + (dateStr.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function daysFrom(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(dateStr + 'T00:00:00');
  return Math.round((due - today) / 86400000);
}
function statusOf(days) {
  if (days === null) return 'grey';
  if (days < 0) return 'red';
  if (days <= 6) return 'yellow';
  return 'green';
}
function statusColor(status) {
  return { red: '#dc2626', yellow: '#b45309', green: '#16a34a', grey: '#9ca3af' }[status];
}
function statusBg(status) {
  return { red: '#fee2e2', yellow: '#fef9c3', green: '#dcfce7', grey: '#f3f4f6' }[status];
}
function daysLabel(days) {
  if (days === null) return '—';
  if (days < 0) return `${Math.abs(days)}d overdue`;
  if (days === 0) return 'Due today';
  return `${days}d left`;
}
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderProject(p) {
  const today = new Date(); today.setHours(0,0,0,0);
  const delivs = p.deliverables || [];
  const total = delivs.length;
  const done = delivs.filter(d => d.completed).length;
  const pending = delivs.filter(d => !d.completed);
  const pct = total ? Math.round(done / total * 100) : 0;

  const finalDays = daysFrom(p.finalDeliveryDate);
  const statusCounts = {
    critical: pending.filter(d => { const x = daysFrom(d.dueDate); return x !== null && x < 0; }).length,
    warning: pending.filter(d => { const x = daysFrom(d.dueDate); return x !== null && x >= 0 && x <= 6; }).length,
    ok: pending.filter(d => { const x = daysFrom(d.dueDate); return x !== null && x > 6; }).length,
  };

  // Gantt: timeline from today to final delivery date
  const tStart = today.getTime();
  const tEnd = p.finalDeliveryDate ? new Date(p.finalDeliveryDate + 'T00:00:00').getTime() : tStart + 30*86400000;
  const tRange = Math.max(tEnd - tStart, 1);

  function barPct(dueDateStr) {
    if (!dueDateStr) return 100;
    const due = new Date(dueDateStr + 'T00:00:00').getTime();
    return Math.min(100, Math.max(2, Math.round((due - tStart) / tRange * 100)));
  }

  let ganttRows = '';
  [...delivs].sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||'')).forEach(d => {
    const days = daysFrom(d.dueDate);
    const st = d.completed ? 'green' : statusOf(days);
    const col = statusColor(st);
    const bg = statusBg(st);
    const pBarPct = barPct(d.dueDate);
    ganttRows += `
      <tr class="gantt-row ${d.completed ? 'completed-row' : ''}">
        <td><div class="d-name"><div class="status-dot" style="background:${col}"></div><span class="${d.completed ? 'completed-name' : ''}">${esc(d.name)}</span></div></td>
        <td class="due-text">${fmtShort(d.dueDate)}</td>
        <td style="text-align:center">
          ${d.completed
            ? `<span class="days-badge" style="background:#dcfce7;color:#16a34a">✓ Done</span>`
            : `<span class="days-badge" style="background:${bg};color:${col}">${daysLabel(days)}</span>`}
        </td>
        <td class="bar-cell">
          <div class="bar-track">
            <div class="bar-fill" style="width:${pBarPct}%;background:${col};opacity:${d.completed ? 0.4 : 1}"></div>
          </div>
        </td>
      </tr>`;
  });

  let stakeholderCards = '';
  (p.stakeholders || []).forEach(s => {
    stakeholderCards += `
      <div class="stakeholder-card">
        <div class="s-name">${esc(s.name)}</div>
        <div class="s-role">${esc(s.role)}</div>
        <div class="s-email">${esc(s.email)}</div>
      </div>`;
  });

  return `
    <div class="project-header">
      <div style="flex:1;min-width:260px">
        <div class="project-title">${esc(p.name)}</div>
        <div class="project-meta-row">
          <span class="badge badge-blue">${esc(p.client)}</span>
          <span class="badge badge-accent">${esc(p.type)}</span>
          <span class="badge badge-green">Active</span>
        </div>
        ${p.notes ? `<div class="project-notes">${esc(p.notes)}</div>` : ''}
        <div class="progress-wrap" style="max-width:340px;margin-top:16px">
          <div class="progress-label"><span>Overall Progress</span><span><strong>${done}</strong> of <strong>${total}</strong> complete</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num accent">${finalDays !== null && finalDays >= 0 ? finalDays : '—'}</div>
          <div class="stat-label">Days to<br>Final Delivery</div>
        </div>
        <div class="stat-box">
          <div class="stat-num green">${pct}%</div>
          <div class="stat-label">Complete</div>
        </div>
        ${statusCounts.critical > 0 ? `<div class="stat-box"><div class="stat-num red">${statusCounts.critical}</div><div class="stat-label">Overdue</div></div>` : ''}
        ${statusCounts.warning > 0 ? `<div class="stat-box"><div class="stat-num yellow">${statusCounts.warning}</div><div class="stat-label">Due Soon</div></div>` : ''}
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <div class="section-title">Timeline &amp; Deliverables</div>
        <div style="font-size:12px;color:var(--muted)">${fmtShort(p.startDate)} → ${fmtShort(p.finalDeliveryDate)}</div>
      </div>
      <div class="section-body" style="padding:0">
        <div class="gantt-wrap">
          <table class="gantt-table">
            <thead>
              <tr>
                <th class="name-col">Deliverable</th>
                <th class="due-col">Due</th>
                <th class="left-col">Status</th>
                <th class="bar-col">Timeline →</th>
              </tr>
            </thead>
            <tbody>${ganttRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    ${stakeholderCards ? `
    <div class="section">
      <div class="section-head"><div class="section-title">Stakeholders</div></div>
      <div class="section-body"><div class="stakeholder-grid">${stakeholderCards}</div></div>
    </div>` : ''}
  `;
}

async function load() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const ts = data.lastUpdated ? new Date(data.lastUpdated).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
    document.getElementById('last-updated').textContent = 'Updated ' + ts;

    let html = '';
    (data.projects || []).filter(p => p.status !== 'archived').forEach(p => {
      html += renderProject(p);
    });
    if (!html) html = '<div class="loading"><div>No active projects.</div></div>';
    document.getElementById('content').innerHTML = html;
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="loading"><div style="color:#dc2626">Failed to load data. Retrying…</div></div>`;
    console.error(e);
  }
}

load();
setInterval(load, REFRESH_MS);
</script>
</body>
</html>
