<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incisiv | Project Deadline Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- SheetJS loaded on demand when user clicks Download Excel -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-bg: #111827; --sidebar-width: 240px;
      --bg: #f0f4f8; --white: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b; --accent: #4f46e5; --accent-light: #ede9fe;
      --green: #16a34a; --green-bg: #dcfce7;
      --yellow: #b45309; --yellow-bg: #fef9c3;
      --red: #dc2626; --red-bg: #fee2e2;
      --grey: #6b7280; --grey-bg: #f3f4f6;
      --blue: #2563eb; --blue-bg: #dbeafe;
      --shadow: 0 1px 3px rgba(0,0,0,.08); --shadow-md: 0 4px 6px rgba(0,0,0,.07); --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
    .sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); color: #cbd5e1; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .sidebar-logo { padding: 24px 20px 16px; border-bottom: 1px solid #1f2937; }
    .sidebar-logo .brand { font-size: 18px; font-weight: 700; color: #fff; }
    .sidebar-logo .sub { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
    .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #4b5563; padding: 8px 8px 4px; font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 7px; cursor: pointer; font-size: 13.5px; color: #94a3b8; transition: all .15s; margin-bottom: 1px; }
    .nav-item:hover { background: #1f2937; color: #e2e8f0; }
    .nav-item.active { background: #1e40af22; color: #818cf8; font-weight: 600; }
    .nav-item svg { flex-shrink: 0; width: 16px; height: 16px; }
    .sidebar-footer { padding: 16px; border-top: 1px solid #1f2937; }
    .sidebar-stat { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12.5px; }
    .sidebar-stat .label { color: #6b7280; }
    .sidebar-stat .val { font-weight: 700; font-size: 15px; }
    .val.yellow { color: #fbbf24; } .val.red { color: #f87171; }
    .user-pill { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 7px; background: #1f2937; cursor: pointer; transition: background .15s; }
    .user-pill:hover { background: #374151; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-info { overflow: hidden; flex: 1; }
    .user-name { font-size: 12px; font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 10px; color: #6b7280; }
    .main { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .page-title { font-size: 16px; font-weight: 700; }
    .topbar-right { display: flex; gap: 10px; align-items: center; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: var(--white); color: var(--text); border: 1px solid var(--border); } .btn-secondary:hover { background: var(--bg); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); } .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-sm { padding: 5px 12px; font-size: 12px; } .btn-xs { padding: 3px 9px; font-size: 11px; border-radius: 5px; }
    .btn-excel { background: #16a34a; color: #fff; } .btn-excel:hover { background: #15803d; }
    .content { padding: 24px 28px; flex: 1; }
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--white); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .stat-card .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .stat-val { font-size: 28px; font-weight: 800; margin: 6px 0 4px; }
    .stat-card .stat-hint { font-size: 12px; color: var(--muted); }
    .stat-card.s-blue .stat-val { color: var(--blue); } .stat-card.s-yellow .stat-val { color: var(--yellow); }
    .stat-card.s-red .stat-val { color: var(--red); } .stat-card.s-green .stat-val { color: var(--green); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 15px; font-weight: 700; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); gap: 16px; margin-bottom: 28px; }
    .project-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; transition: box-shadow .2s; cursor: pointer; }
    .project-card:hover { box-shadow: var(--shadow-md); }
    .project-card-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
    .project-name { font-size: 14px; font-weight: 700; } .project-type { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .project-status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .project-card-body { padding: 14px 18px; }
    .project-meta { display: flex; gap: 16px; margin-bottom: 12px; }
    .meta-item { font-size: 12px; color: var(--muted); }
    .meta-item strong { color: var(--text); display: block; font-size: 13px; }
    .deliverable-summary { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 600; }
    .pill-green { background: var(--green-bg); color: var(--green); } .pill-yellow { background: var(--yellow-bg); color: var(--yellow); }
    .pill-red { background: var(--red-bg); color: var(--red); } .pill-grey { background: var(--grey-bg); color: var(--grey); }
    .pill-blue { background: var(--blue-bg); color: var(--blue); } .pill-accent { background: var(--accent-light); color: var(--accent); }
    .project-card-footer { padding: 10px 18px; background: #fafafa; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .progress-bar-wrap { flex: 1; margin-right: 16px; }
    .progress-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
    .progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: var(--accent); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .table-wrap { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
    .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .table-title { font-size: 14px; font-weight: 700; }
    .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 7px 12px; min-width: 200px; }
    .search-box input { border: none; background: transparent; outline: none; font-size: 13px; color: var(--text); width: 100%; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8fafc; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
    th:hover { background: #f1f5f9; color: var(--text); }
    td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; } tr:hover td { background: #fafbfc; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
    .badge-green { background: var(--green-bg); color: var(--green); } .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
    .badge-red { background: var(--red-bg); color: var(--red); } .badge-grey { background: var(--grey-bg); color: var(--grey); }
    .badge-blue { background: var(--blue-bg); color: var(--blue); }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .badge-estimated { font-size: 10px; background: var(--yellow-bg); color: var(--yellow); border-radius: 4px; padding: 1px 5px; font-weight: 600; margin-left: 4px; }
    .source-file { font-size: 11px; color: var(--muted); }
    .tag { display: inline-block; background: var(--accent-light); color: var(--accent); border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .gantt-wrap { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
    .gantt-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .gantt-header-title { font-size: 14px; font-weight: 700; }
    .gantt-legend { display: flex; gap: 14px; }
    .gantt-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .gantt-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .gantt-body { padding: 16px 20px 20px; overflow-x: auto; }
    .gantt-date-header { display: flex; margin-bottom: 8px; margin-left: 220px; position: relative; height: 20px; }
    .gantt-date-tick { position: absolute; font-size: 10px; color: var(--muted); transform: translateX(-50%); white-space: nowrap; }
    .gantt-row { display: flex; align-items: center; margin-bottom: 6px; min-height: 32px; }
    .gantt-row-label { width: 220px; flex-shrink: 0; padding-right: 16px; display: flex; align-items: center; gap: 6px; }
    .gantt-row-label span { font-size: 12.5px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .gantt-track { flex: 1; height: 32px; background: #f8fafc; border-radius: 6px; position: relative; min-width: 400px; border: 1px solid #f1f5f9; }
    .gantt-today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); z-index: 3; border-radius: 1px; }
    .gantt-today-label { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--accent); font-weight: 700; white-space: nowrap; background: var(--white); padding: 0 3px; }
    .gantt-milestone { position: absolute; top: 50%; transform: translate(-50%, -50%); z-index: 4; cursor: pointer; }
    .gantt-diamond { width: 14px; height: 14px; border-radius: 2px; transform: rotate(45deg); display: block; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
    .gantt-milestone-label { position: absolute; top: 50%; left: 18px; transform: translateY(-50%); font-size: 11px; font-weight: 600; white-space: nowrap; color: var(--text); background: rgba(255,255,255,.9); padding: 1px 4px; border-radius: 3px; pointer-events: none; }
    .gantt-milestone-days { font-size: 10px; font-weight: 700; color: inherit; margin-left: 4px; }
    .gantt-project-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 12px 0 6px; }
    .log-body { max-height: 300px; overflow-y: auto; }
    .log-entry { padding: 10px 18px; border-bottom: 1px solid #f1f5f9; font-size: 12.5px; display: flex; align-items: flex-start; gap: 10px; }
    .log-entry:last-child { border-bottom: none; }
    .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .log-time { color: var(--muted); flex-shrink: 0; font-size: 11px; min-width: 130px; }
    .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); color: var(--muted); transition: all .15s; }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: #1e293b; color: #fff; padding: 12px 18px; border-radius: 9px; font-size: 13px; font-weight: 500; box-shadow: 0 4px 12px rgba(0,0,0,.2); display: flex; align-items: center; gap: 10px; animation: slideUp .2s ease; min-width: 280px; }
    .toast.success { border-left: 4px solid var(--green); } .toast.error { border-left: 4px solid var(--red); } .toast.warning { border-left: 4px solid #f59e0b; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* LOGIN */
    #login-screen { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 44px; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,.35); }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .brand-name { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -.5px; }
    .login-logo .brand-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
    .login-logo .brand-divider { width: 32px; height: 3px; background: var(--accent); border-radius: 99px; margin: 12px auto 0; }
    .login-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; text-align: center; }
    .login-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 24px; }
    .login-group { margin-bottom: 16px; }
    .login-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .login-group input { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; transition: border-color .15s; }
    .login-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    .login-btn { width: 100%; padding: 11px; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 700; border: none; cursor: pointer; transition: background .15s; margin-top: 8px; }
    .login-btn:hover { background: #4338ca; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }
    .login-error { background: var(--red-bg); color: var(--red); border-radius: 7px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none; }

    /* ADMIN */
    .admin-badge { display: inline-flex; align-items: center; gap: 4px; background: #fef3c7; color: #92400e; border-radius: 5px; padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: .4px; }
    .user-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .user-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .user-card-name { font-size: 14px; font-weight: 700; }
    .user-card-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .project-checkboxes { display: flex; flex-wrap: wrap; gap: 8px; }
    .project-toggle { display: inline-flex; align-items: center; gap: 6px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: all .15s; font-size: 12.5px; font-weight: 600; color: var(--muted); user-select: none; }
    .project-toggle.granted { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .project-toggle:hover { border-color: var(--accent); }

    /* ACCESS PENDING */
    .access-pending { text-align: center; padding: 80px 40px; }
    .access-pending h2 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .access-pending p { font-size: 14px; color: var(--muted); line-height: 1.7; }

    ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-name">Incisiv</div>
      <div class="brand-sub">Project Tracker</div>
      <div class="brand-divider"></div>
    </div>
    <div class="login-title">Sign in to your account</div>
    <div class="login-sub">Access is granted by invitation only.</div>
    <div class="login-group">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="login-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP SIDEBAR -->
<aside class="sidebar" id="app-sidebar" style="display:none;">
  <div class="sidebar-logo">
    <div class="brand">Incisiv</div>
    <div class="sub">Deadline Tracker</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Workspace</div>
    <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </div>
    <div class="nav-item" onclick="navigate('all-deliverables')" id="nav-all-deliverables">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      All Deliverables
    </div>
    <div class="nav-item" onclick="navigate('log')" id="nav-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Activity Log
    </div>
    <div class="nav-item" onclick="navigate('admin')" id="nav-admin" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin Panel
    </div>
    <div class="nav-label" style="margin-top:12px;">Projects</div>
    <div id="sidebar-projects"></div>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-stat"><span class="label">Due This Week</span><span class="val yellow" id="sb-week">—</span></div>
    <div class="sidebar-stat"><span class="label">Overdue</span><span class="val red" id="sb-overdue">—</span></div>
    <div class="user-pill" onclick="doLogout()" title="Click to sign out">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name-display">…</div>
        <div class="user-role" id="user-role-display">Sign out ↗</div>
      </div>
    </div>
  </div>
</aside>

<!-- APP MAIN -->
<main class="main" id="app-main" style="display:none;">
  <div class="topbar">
    <div><span class="page-title" id="page-title">Dashboard</span></div>
    <div class="topbar-right">
      <button class="btn btn-excel btn-sm" onclick="exportExcel()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Download Excel
      </button>
    </div>
  </div>
  <div class="content" id="main-content"></div>
</main>

<div id="toast-container"></div>

<script>

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');
  err.style.display = 'none';
  if (!email || !pass) { showLoginError('Please enter your email and password.'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    const friendly = /invalid.login|invalid.credentials|email.not.confirmed|wrong.password/i.test(error.message)
      ? 'Incorrect email or password. Please try again.'
      : /rate.limit/i.test(error.message)
      ? 'Too many attempts. Please wait a moment and try again.'
      : error.message;
    showLoginError(friendly);
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

  e.textContent = msg; e.style.display = 'block';

// ── DATA LOADING ──────────────────────────────────────────────────────────────
async function loadAppData() {
  // Fetch project data + access permissions in parallel
  if (isAdmin) {
    const [projRes] = await Promise.all([
      fetch('./data.json?t=' + Date.now()).catch(() => null),
      loadAdminData()
    ]);
    try { if (projRes && projRes.ok) allProjects = (await projRes.json()).projects || SEED_PROJECTS; }
    catch(e) { allProjects = SEED_PROJECTS; }
    visibleProjects = allProjects;
  } else {
    const [projRes, { data: access }] = await Promise.all([
      fetch('./data.json?t=' + Date.now()).catch(() => null),
      sb.from('project_access').select('project_id').eq('user_id', currentUser.id)
    ]);
    try { if (projRes && projRes.ok) allProjects = (await projRes.json()).projects || SEED_PROJECTS; }
    catch(e) { allProjects = SEED_PROJECTS; }
    const allowed = new Set((access || []).map(r => r.project_id));
    visibleProjects = allProjects.filter(p => allowed.has(p.id));
  }
}

async function loadAdminData() {
  const [{ data: users }, { data: access }] = await Promise.all([
    sb.from('client_profiles').select('*').order('created_at'),
    sb.from('project_access').select('*')
  ]);
  allUsers = users || [];
  userAccessMap = {};
  (access || []).forEach(r => {
    userAccessMap[r.user_id] = userAccessMap[r.user_id] || [];
    userAccessMap[r.user_id].push(r.project_id);
  });
}

// ── STATUS HELPERS ────────────────────────────────────────────────────────────
function calcStatus(dueStr, isComplete) {
  if (isComplete) return {status:'complete',days:null,label:'Complete',cls:'badge-blue',dot:'#3b82f6',color:'#3b82f6'};
  if (!dueStr)    return {status:'unknown',days:null,label:'No Date',cls:'badge-grey',dot:'#9ca3af',color:'#9ca3af'};
  const now=new Date(); now.setHours(0,0,0,0);
  const due=new Date(dueStr); due.setHours(0,0,0,0);
  const diff=Math.round((due-now)/86400000);
  if (diff<0)  return {status:'overdue',days:diff,label:`${Math.abs(diff)}d overdue`,cls:'badge-grey',dot:'#6b7280',color:'#6b7280'};
  if (diff<=2) return {status:'critical',days:diff,label:diff===0?'Due Today':`${diff}d left`,cls:'badge-red',dot:'#ef4444',color:'#ef4444'};
  if (diff<=6) return {status:'warning',days:diff,label:`${diff}d left`,cls:'badge-yellow',dot:'#eab308',color:'#ca8a04'};
  return {status:'ok',days:diff,label:`${diff}d left`,cls:'badge-green',dot:'#22c55e',color:'#16a34a'};
}
function projectDot(p) {
  const d=(p.deliverables||[]).filter(x=>!x.completed);
  if(!d.length) return '#22c55e';
  const st=d.map(x=>calcStatus(x.dueDate,x.completed).status);
  if(st.includes('overdue'))  return '#6b7280';
  if(st.includes('critical')) return '#ef4444';
  if(st.includes('warning'))  return '#eab308';
  return '#22c55e';
}
function projectProgress(p) {
  const a=p.deliverables||[]; if(!a.length) return 0;
  return Math.round(a.filter(d=>d.completed).length/a.length*100);
}

// ── GANTT ─────────────────────────────────────────────────────────────────────
function renderGantt(projects) {
  const allD=projects.flatMap(p=>(p.deliverables||[]).filter(d=>d.dueDate).map(d=>({...d,projectName:p.name})));
  if(!allD.length) return '';
  const dates=allD.map(d=>new Date(d.dueDate));
  const minD=new Date(Math.min(...dates)); const maxD=new Date(Math.max(...dates));
  minD.setDate(minD.getDate()-5); maxD.setDate(maxD.getDate()+8);
  const totalMs=maxD-minD;
  const pct=d=>Math.max(1,Math.min(99,((new Date(d)-minD)/totalMs)*100));
  const todayPct=Math.max(0,Math.min(100,((new Date()-minD)/totalMs)*100));
  let ticks=''; for(let i=0;i<=5;i++){const d=new Date(minD.getTime()+(totalMs/5)*i);ticks+=`<div class="gantt-date-tick" style="left:${i/5*100}%;">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`;}
  let h=`<div class="gantt-wrap"><div class="gantt-header"><span class="gantt-header-title">Timeline Overview</span><div class="gantt-legend"><div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#22c55e;"></div>7+ days</div><div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#eab308;"></div>3–6 days</div><div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#ef4444;"></div>1–2 days</div><div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#3b82f6;"></div>Complete</div><div class="gantt-legend-item"><div class="gantt-legend-dot" style="background:#6b7280;"></div>Overdue</div></div></div><div class="gantt-body"><div class="gantt-date-header" style="margin-bottom:16px;">${ticks}</div>`;
  projects.forEach(p=>{
    const delivs=(p.deliverables||[]).filter(d=>d.dueDate); if(!delivs.length) return;
    h+=`<div class="gantt-project-label">${esc(p.name)}</div>`;
    delivs.forEach(d=>{
      const s=calcStatus(d.dueDate,d.completed), pos=pct(d.dueDate), lr=pos>75;
      h+=`<div class="gantt-row"><div class="gantt-row-label">${d.completed?'<span style="color:var(--green);font-size:12px;flex-shrink:0;">✓</span>':''}<span title="${esc(d.name)}" style="${d.completed?'text-decoration:line-through;color:var(--muted);':''}">${esc(d.name)}</span></div><div class="gantt-track"><div class="gantt-today-line" style="left:${todayPct}%;"><div class="gantt-today-label">Today</div></div><div class="gantt-milestone" style="left:${pos}%;"><div class="gantt-diamond" style="background:${s.color};"></div><div class="gantt-milestone-label" style="${lr?'left:auto;right:18px;':'left:18px;'}">${fmtDate(d.dueDate)} <span class="gantt-milestone-days" style="color:${s.color};">${s.label}</span></div></div></div></div>`;
    });
  });
  h+=`</div></div>`; return h;
}

function renderAllDeliverables() {
  const all=visibleProjects.flatMap(p=>(p.deliverables||[]).map(d=>({...d,projectName:p.name,projectId:p.id})));
  const filtered=all.filter(d=>{
    if(delivFilter==='active'  &&d.completed) return false;
    if(delivFilter==='overdue' &&(d.completed||calcStatus(d.dueDate).status!=='overdue')) return false;
    if(delivFilter==='critical'&&(d.completed||!['critical','warning'].includes(calcStatus(d.dueDate).status))) return false;
    if(delivFilter==='complete'&&!d.completed) return false;
    if(delivSearch){const q=delivSearch.toLowerCase();if(!d.name.toLowerCase().includes(q)&&!d.projectName.toLowerCase().includes(q))return false;}

  }).sort((a,b)=>{
    let av=a[delivSortCol]||'', bv=b[delivSortCol]||'';
    if(delivSortCol==='dueDate'){av=av||'9999';bv=bv||'9999';}
    if(delivSortCol==='days'){av=calcStatus(a.dueDate,a.completed).days??9999;bv=calcStatus(b.dueDate,b.completed).days??9999;}

  const arrow=c=>delivSortCol===c?(delivSortDir===1?' ↑':' ↓'):'';

    <th onclick="sortD('projectName')">Project${arrow('projectName')}</th>
    <th onclick="sortD('dueDate')">Due Date${arrow('dueDate')}</th>
    <th onclick="sortD('days')">Status${arrow('days')}</th>
    <th>Source</th>
  </tr></thead><tbody>`;
  if(!filtered.length) h+=`<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted);">No deliverables found.</td></tr>`;
  else filtered.forEach(d=>{
    const s=calcStatus(d.dueDate,d.completed);

      <td><strong>${esc(d.name)}</strong>${d.dateType==='estimated'?'<span class="badge-estimated">~est</span>':''}</td>

      <td><span class="source-file">${esc(d.sourceFile||'—')}</span></td>

  });
  h+=`</tbody></table></div>`;
  return h;

    </div>
    ${p.notes?`<div style="font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:10px;">${esc(p.notes)}</div>`:''}
    ${p.stakeholders&&p.stakeholders.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;">${p.stakeholders.map(s=>`<span class="pill pill-accent" title="${esc(s.email)}">${esc(s.name)}${s.role?' ('+esc(s.role)+')':''}</span>`).join('')}</div>`:''}
  </div>
  <div class="table-wrap">
    <div class="table-header"><span class="table-title">Deliverables (${delivs.length})</span></div>
    <table><thead><tr><th>Deliverable</th><th>Due Date</th><th>Status</th><th>Source</th><th>Notes</th></tr></thead><tbody>`;
  if(!delivs.length) h+=`<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted);">No deliverables.</td></tr>`;
  else [...delivs].sort((a,b)=>{if(a.completed&&!b.completed)return 1;if(!a.completed&&b.completed)return-1;return(a.dueDate||'9999')<(b.dueDate||'9999')?-1:1;}).forEach(d=>{
    const s=calcStatus(d.dueDate,d.completed);
    h+=`<tr style="${d.completed?'opacity:.55;':''}">
      <td><strong>${esc(d.name)}</strong>${d.dateType==='estimated'?'<span class="badge-estimated">~est</span>':''}</td>
      <td>${d.dueDate?fmtDate(d.dueDate):'—'}</td>
      <td><span class="status-badge ${s.cls}"><span class="dot" style="background:${s.dot};"></span>${s.label}</span></td>
      <td><span class="source-file">${esc(d.sourceFile||'—')}</span></td>
      <td style="font-size:12px;color:var(--muted);">${esc(d.notes||'—')}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

// ── LOG ───────────────────────────────────────────────────────────────────────
function renderLog() {
  const logs=[];
  visibleProjects.forEach(p=>(p.logs||[]).forEach(l=>logs.push({...l,project:p.name})));
  const sorted=[...logs].sort((a,b)=>new Date(b.timestamp||0)-new Date(a.timestamp||0)).slice(0,200);
  if(!sorted.length) return `<div class="empty-state"><div style="font-size:48px">📋</div><p>No log entries.</p></div>`;
  const colors={info:'#3b82f6',success:'#16a34a',warning:'#ca8a04',error:'#dc2626'};
  let h=`<div class="table-wrap"><div class="table-header"><span class="table-title">Activity Log (${sorted.length})</span></div><div class="log-body">`;
  sorted.forEach(l=>{h+=`<div class="log-entry"><div class="log-dot" style="background:${colors[l.type]||'#94a3b8'};"></div><div class="log-time">${l.timestamp?new Date(l.timestamp).toLocaleString():l.date||''}</div><div>${esc(l.message||l.action||'')}${l.project?` <span style="font-size:11px;color:var(--muted);">— ${esc(l.project)}</span>`:''}</div></div>`;});
  h+=`</div></div>`;
  return h;
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
function renderAdminPanel() {
  let h=`<div style="background:#fefce8;border:1px solid #fde047;border-radius:8px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:#713f12;display:flex;align-items:center;gap:10px;">
    <span style="font-size:18px;">🛡️</span>
    <span>You're viewing as <strong>Admin</strong>. Create user accounts directly in the <a href="https://supabase.com/dashboard/project/sreyiojexannfsxrblxu/auth/users" target="_blank" style="color:#92400e;font-weight:700;text-decoration:underline;">Supabase dashboard</a> — users appear here after their first login.</span>
  </div>`;

  h+=`<div style="font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px;">Client Access Management <span class="admin-badge">● ADMIN</span></div>`;

  const clients=allUsers.filter(u=>u.email!==ADMIN_EMAIL);
  if(!clients.length) {
    h+=`<div class="table-wrap" style="padding:40px;text-align:center;color:var(--muted);">No client accounts yet. Create users in Supabase and they'll appear here after first login.</div>`;
  } else {
    clients.forEach(u=>{
      const ua=userAccessMap[u.id]||[];
      h+=`<div class="user-card">
        <div class="user-card-header">
          <div><div class="user-card-name">${esc(u.full_name||u.email)}</div><div class="user-card-email">${esc(u.email)}</div></div>
          <div style="font-size:11px;color:var(--muted);">Joined ${u.created_at?new Date(u.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—'}</div>
        </div>
        <div style="font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:8px;">Project Access:</div>
        <div class="project-checkboxes">`;
      allProjects.forEach(p=>{
        const granted=ua.includes(p.id);
        h+=`<div class="project-toggle ${granted?'granted':''}" onclick="toggleAccess('${u.id}','${p.id}',${!granted},this)">${granted?'✓ ':''}${esc(p.name)}</div>`;
      });
      h+=`</div></div>`;
    });
  }

  h+=`<div style="font-size:15px;font-weight:700;margin:24px 0 14px;">All Projects Overview</div>
  <div class="table-wrap"><table><thead><tr><th>Project</th><th>Client</th><th>Type</th><th>Final Delivery</th><th>Progress</th></tr></thead><tbody>`;
  allProjects.forEach(p=>{
    const prog=projectProgress(p);
    h+=`<tr onclick="navigate('project','${p.id}')" style="cursor:pointer;"><td><strong>${esc(p.name)}</strong></td><td>${esc(p.client||'—')}</td><td>${esc(p.type||'—')}</td><td>${fmtDate(p.finalDeliveryDate)}</td><td><div style="display:flex;align-items:center;gap:8px;"><div class="progress-bar" style="width:80px;"><div class="progress-fill" style="width:${prog}%;"></div></div><span style="font-size:12px;color:var(--muted);">${prog}%</span></div></td></tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

async function toggleAccess(userId, projectId, grant, el) {
  el.style.opacity='0.5'; el.style.pointerEvents='none';
  if(grant){
    const {error}=await sb.from('project_access').insert({user_id:userId,project_id:projectId});
    if(!error){ userAccessMap[userId]=userAccessMap[userId]||[]; userAccessMap[userId].push(projectId); el.classList.add('granted'); el.textContent='✓ '+el.textContent.trim(); toast('Access granted.','success'); }
    else { toast('Error: '+error.message,'error'); }
  } else {
    const {error}=await sb.from('project_access').delete().eq('user_id',userId).eq('project_id',projectId);
    if(!error){ userAccessMap[userId]=(userAccessMap[userId]||[]).filter(id=>id!==projectId); el.classList.remove('granted'); el.textContent=el.textContent.replace('✓ ','').trim(); toast('Access removed.','warning'); }
    else { toast('Error: '+error.message,'error'); }
  }
  el.style.opacity='1'; el.style.pointerEvents='';
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function updateSidebar() {
  const allD=visibleProjects.flatMap(p=>p.deliverables||[]);
  document.getElementById('sb-week').textContent    = allD.filter(d=>{if(d.completed)return false;const s=calcStatus(d.dueDate);return s.days!==null&&s.days>=0&&s.days<=7;}).length;
  document.getElementById('sb-overdue').textContent = allD.filter(d=>!d.completed&&calcStatus(d.dueDate).status==='overdue').length;
  document.getElementById('sidebar-projects').innerHTML=visibleProjects.filter(p=>p.status==='active').map(p=>`<div class="nav-item ${view==='project'&&pid===p.id?'active':''}" onclick="navigate('project','${p.id}')"><div style="width:7px;height:7px;border-radius:50%;background:${projectDot(p)};flex-shrink:0;"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</span></div>`).join('');
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────────
async function exportExcel() {
  if(!window.XLSX) {
    toast('Loading Excel library…','info');
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  const wb=XLSX.utils.book_new();
  // Sheet 1: Summary
  const sumRows=[['Project','Client','Type','Start Date','Final Delivery','Progress %','Pending','Overdue']];
  visibleProjects.forEach(p=>{
    const delivs=p.deliverables||[], prog=projectProgress(p);
    const pending=delivs.filter(d=>!d.completed).length;
    const overdue=delivs.filter(d=>!d.completed&&calcStatus(d.dueDate).status==='overdue').length;
    sumRows.push([p.name,p.client||'',p.type||'',p.startDate||'',p.finalDeliveryDate||'',prog,pending,overdue]);
  });
  const ws1=XLSX.utils.aoa_to_sheet(sumRows);
  ws1['!cols']=[40,20,22,14,14,12,10,10].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws1,'Projects Summary');
  // Sheet 2: Deliverables
  const delRows=[['Project','Client','Deliverable','Due Date','Status','Days Left','Source File','Notes','Completed?']];
  visibleProjects.forEach(p=>{
    (p.deliverables||[]).forEach(d=>{
      const s=calcStatus(d.dueDate,d.completed);
      delRows.push([p.name,p.client||'',d.name,d.dueDate||'',s.label,s.days!=null?s.days:'',d.sourceFile||'',d.notes||'',d.completed?'Yes':'No']);
    });
  });
  const ws2=XLSX.utils.aoa_to_sheet(delRows);
  ws2['!cols']=[35,18,42,14,14,10,25,40,10].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws2,'All Deliverables');
  XLSX.writeFile(wb,`Incisiv_Project_Deadlines_${new Date().toISOString().split('T')[0]}.xlsx`);
  toast('Excel downloaded!','success');
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtDate(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function toast(msg,type='info'){const tc=document.getElementById('toast-container');const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span>${{success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'}[type]||'ℹ️'}</span><span>${esc(msg)}</span>`;tc.appendChild(t);setTimeout(()=>t.remove(),3500);}

// Auto-refresh every 5 minutes
setInterval(async()=>{ if(!currentUser)return; await loadAppData(); render(); }, 5*60*1000);
</script>
